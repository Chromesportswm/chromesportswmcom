# Netlify configuration for Chrome Sports W.M
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  publish = "dist"
  command = "npm run build"

# Redirect SPA-style: all routes serve index.html (optional; uncomment if you add client-side routing later)
# [[redirects]]
#   from = "/*"
#   to = "/index.html"
#   status = 200

# Cache static assets
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
